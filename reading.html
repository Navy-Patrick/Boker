<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>道德经合集 | Patrick 的静心小站</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="./index.html">Patrick · 静心小站</a>
      <nav class="nav">
        <a href="./index.html">首页</a>
        <a href="./diary.html">日记随笔</a>
        <a class="active" href="./reading.html">道德经合集</a>
        <a href="./projects.html">技术项目</a>
        <a href="./about.html">关于</a>
      </nav>
    </div>
  </header>

  <div class="site-wrap">
    <main class="main">
      <section class="panel">
        <div class="section-head">
          <h1 class="section-title">经典读后感</h1>
        </div>

        <h2 class="group-title">《道德经》</h2>
        <ul class="item-list" id="reading-list"></ul>
      </section>
    </main>

    <footer class="footer">© 2026 Patrick · GitHub Pages</footer>
  </div>

  <script src="./data/diary.js"></script>
  <script src="./data/reading.js"></script>
  <script src="./app.js"></script>
  <script>
    (async () => {
      const list = document.getElementById('reading-list');
      try {
        const posts = await BlogApp.loadJson('./data/reading.json');
        const ddj = posts.filter(item => item.book === '道德经').sort((a, b) => (a.date < b.date ? 1 : -1));
        list.innerHTML = ddj.map(item => `
          <li class="item card-row">
            <div class="item-meta">${BlogApp.formatDate(item.date)} · ${item.section}</div>
            <h3 class="item-title"><a href="./article.html?type=reading&id=${encodeURIComponent(item.id)}">${item.title}</a></h3>
            <p class="item-desc">${item.summary}</p>
          </li>
        `).join('');
      } catch (e) {
        list.innerHTML = '<li class="empty">暂时无法加载读书目录。</li>';
      }
    })();
  </script>
</body>
</html>
