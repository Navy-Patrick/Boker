<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章合集 | Patrick 的静心小站</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-title" href="./index.html">Patrick · 静心小站</a>
      <nav class="nav">
        <a href="./index.html">首页</a>
        <a href="./diary.html">日记随笔</a>
        <a class="active" href="./reading.html">文章合集</a>
        <a href="./projects.html">技术项目</a>
        <a href="./about.html">关于</a>
      </nav>
    </div>
  </header>

  <div class="site-wrap">
    <main class="main">
      <section class="panel">
        <div class="section-head">
          <h1 class="section-title">文章合集</h1>
        </div>

        <ul class="book-tabs" id="book-tabs"></ul>
        <div id="book-groups"></div>
      </section>
    </main>

    <footer class="footer">© 2026 Patrick · GitHub Pages</footer>
  </div>

  <script src="./data/diary.js"></script>
  <script src="./data/reading.js"></script>
  <script src="./app.js"></script>
  <script>
    (async () => {
      const tabsEl = document.getElementById('book-tabs');
      const groupsEl = document.getElementById('book-groups');

      try {
        const posts = await BlogApp.loadJson('./data/reading.json');
        const sorted = posts.slice().sort((a, b) => (a.date < b.date ? 1 : -1));

        const byBook = sorted.reduce((acc, item) => {
          const key = item.book || '未分类';
          if (!acc[key]) acc[key] = [];
          acc[key].push(item);
          return acc;
        }, {});

        const books = Object.keys(byBook);

        tabsEl.innerHTML = books.map((book, i) => `
          <li><a href="#book-${i}" class="book-tab">${book}<span>${byBook[book].length}</span></a></li>
        `).join('');

        groupsEl.innerHTML = books.map((book, i) => `
          <section class="book-group" id="book-${i}">
            <h2 class="group-title">《${book}》</h2>
            <ul class="item-list">
              ${byBook[book].map(item => `
                <li class="item card-row">
                  <div class="item-meta">${BlogApp.formatDate(item.date)} · ${item.section || '未分章'}</div>
                  <h3 class="item-title"><a href="./article.html?type=reading&id=${encodeURIComponent(item.id)}">${item.title}</a></h3>
                  <p class="item-desc">${item.summary}</p>
                </li>
              `).join('')}
            </ul>
          </section>
        `).join('');
      } catch (e) {
        groupsEl.innerHTML = '<p class="empty">暂时无法加载文章合集目录。</p>';
      }
    })();
  </script>
</body>
</html>
